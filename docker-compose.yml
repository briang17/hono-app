version: '3.8'
services:
  database:
    image: postgres:alpine
    restart: unless-stopped
    container_name: database
    
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}

    ports:
      - "127.0.0.1:${DB_PORT}:5432"

    networks:
      - proxy_net

  adminer-api:
    image: adminer
    restart: unless-stopped
    container_name: adminer-api
    networks:
      - proxy_net

  redis:
    image: redis:alpine
    container_name: redis
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proxy_net
volumes:
  redis_data:

networks:
  proxy_net:
    external: true